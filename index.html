<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>College Finder</title>
  <link rel="icon" type="imgae/png" href="Assets/College.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>CET College Predictor</h1>
    <p>Find colleges based on your percentile</p>
  </header>

  <button class="filter-toggle" onclick="toggleFilters()">
  <span class="icon">☰</span>
  <span>Filters</span>
</button>
  <div class="main">
    
    <!-- Filters -->
    <div class="filters">
      <input type="number" id="percentile" placeholder="Enter Percentile" />

      <input type="text" id="collegeSearch" placeholder="Search College Name" />

      <select id="course"></select>
      <select id="district"></select>
      <select id="category"></select>
      <select id="gender"></select>

      <button onclick="filterData()">Search</button>
      <a href="Assets/cet 2025.pdf" class="download-btn" download>
        ⬇ Download PDF
      </a>
    </div>

    <!-- Results -->
    <div id="results" class="results"></div>

  </div>

  <!-- College Details Modal -->
  <div id="collegeModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="college.js"></script>
</body>
</html>
