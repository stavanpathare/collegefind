<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>College Finder | MHT CET College Predictor</title>
  <link rel="icon" type="imgae/png" href="Assets/College.png">
  <link rel="stylesheet" href="style.css" />
  <meta name="google-site-verification" content="yh-71o62KoYv-DYmOqUSHqqe1skYpYGv1SrpkGSXJMw" />
  <!-- Basic SEO -->

<meta name="description" content="Find engineering colleges in Maharashtra based on your MHT CET percentile. Filter by branch, district, category, and gender. Accurate cutoff data for 2025 aspirants." />

<meta name="keywords" content="MHT CET college predictor 2025, CET cutoff Maharashtra, engineering colleges by percentile, CET college finder, MHT CET cutoff list, college predictor India" />

<meta name="author" content="College Finder" />

<!-- Mobile Optimization -->
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Open Graph (for WhatsApp / LinkedIn) -->
<meta property="og:title" content="MHT CET College Predictor 2025" />
<meta property="og:description" content="Check colleges based on your percentile, category, and branch. Fast and accurate CET predictor." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://collegefind.netlify.app/" />
<meta property="og:image" content="https://collegefind.netlify.app/College.png" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="MHT CET College Predictor 2025" />
<meta name="twitter:description" content="Find best colleges based on your percentile instantly." />
<meta name="twitter:image" content="https://collegefind.netlify.app/College.png" />

<!-- Favicon -->
<link rel="icon" href="Assets/College.png" />

<!-- Robots -->
<meta name="robots" content="index, follow" />
</head>
<body>

  <header>
    <h1>CET College Predictor</h1>
    <p>Find colleges based on your percentile</p>
  </header>

  <button class="filter-toggle" onclick="toggleFilters()">
  <span class="icon">☰</span>
  <span>Filters</span>
</button>
  <div class="main">
    
    <!-- Filters -->
    <div class="filters">
      <input type="number" id="percentile" placeholder="Enter Percentile" />

      <input type="text" id="collegeSearch" placeholder="Search College Name" />

      <select id="course"></select>
      <select id="district"></select>
      <select id="category"></select>
      <select id="gender"></select>

      <button onclick="filterData()">Search</button>
      <a href="Assets/cet 2025.pdf" class="download-btn" download>
        ⬇ Download PDF
      </a>
    </div>

    <!-- Results -->
    <div id="results" class="results"></div>

  </div>

  <!-- College Details Modal -->
  <div id="collegeModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="college.js"></script>
  <footer class="footer">
  <div class="footer-content">
    <p>© 2026, Created by Stavan Labs. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
