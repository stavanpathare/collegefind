<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Item | Campus Lost and Found</title>
  <link rel="icon" type="image/png" href="assets/icons/school.png">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="page-shell auth-shell">
    <header class="site-header">
      <nav class="navbar">
        <a href="index.html" class="brand">Campus Lost & Found</a>
        <div class="nav-links" id="mainNav">
          <a href="index.html">Home</a>
          <a href="add-item.html">Add Item</a>
        </div>
        <div class="nav-actions" id="nav-auth">
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
        </div>
        <button type="button" class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      </nav>
    </header>

    <main class="auth-card card-shadow">
      <div class="auth-intro">
        <span class="eyebrow">Report Found Item</span>
        <h1>Share details of the found item</h1>
        <p>Submit the item so someone can reclaim it quickly with the right contact details.</p>
      </div>

      <form id="addItemForm" class="auth-form" enctype="multipart/form-data">
        <div class="form-group">
          <label for="title">Item title</label>
          <input id="title" name="title" type="text" placeholder="Blue backpack" required />
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" placeholder="Add details like brand, color, and where you found it." required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group half-width">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="">Select category</option>
              <option value="electronics">Electronics</option>
              <option value="books">Books</option>
              <option value="keys">Keys</option>
              <option value="accessories">Accessories</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group half-width">
            <label for="location">Location</label>
            <input id="location" name="location" type="text" placeholder="Campus library, dorm lobby" required />
          </div>
        </div>
        <div class="form-group">
          <label for="contact">Contact details</label>
          <input id="contact" name="contact" type="text" placeholder="Email or phone" required />
        </div>
        <div class="form-group">
          <label for="image">Upload image</label>
          <input id="image" name="image" type="file" accept="image/*" required />
          <div id="imagePreview" class="image-preview">Preview will appear here</div>
        </div>
        <div id="formMessage" class="form-message"></div>
        <button type="submit" class="btn btn-primary btn-block">Submit Item</button>
      </form>
    </main>

    <footer class="site-footer auth-footer">
      <p>&copy; 2026 Campus Lost and Found</p>
    </footer>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <div id="globalLoader" class="loader-overlay hidden"><div class="loader"></div></div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/addItem.js"></script>
</body>
</html>
