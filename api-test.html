<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Test | Campus Lost and Found</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .test-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
    }
    .test-result {
      margin: 1rem 0;
      padding: 1rem;
      border-radius: 8px;
      background: #f5f9ff;
      border-left: 4px solid #2150a0;
    }
    .test-result.success {
      background: #e8f5e9;
      border-left-color: #4caf50;
    }
    .test-result.error {
      background: #ffebee;
      border-left-color: #d63447;
    }
    .test-result h4 {
      margin: 0 0 0.5rem;
    }
    pre {
      background: #fff;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #2150a0;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #3d72b4;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="brand">Campus Lost & Found</a>
    </nav>
  </header>

  <main class="test-container">
    <h1>API Connectivity Test</h1>
    <p>Use this page to diagnose backend connection issues.</p>

    <div>
      <button onclick="testHealthCheck()">Test Backend Health</button>
      <button onclick="testGetAllItems()">Test Get All Items</button>
      <button onclick="testGetSingleItem()">Test Get Single Item</button>
    </div>

    <div id="resultsContainer"></div>
  </main>

  <script>
    const API_URL = "http://localhost:5000/api";
    const resultsContainer = document.querySelector("#resultsContainer");

    function addResult(title, status, data) {
      const resultDiv = document.createElement("div");
      resultDiv.className = `test-result ${status}`;
      resultDiv.innerHTML = `
        <h4>${title}</h4>
        <p><strong>Status:</strong> ${status.toUpperCase()}</p>
        <pre>${JSON.stringify(data, null, 2)}</pre>
      `;
      resultsContainer.appendChild(resultDiv);
    }

    async function testHealthCheck() {
      try {
        const response = await fetch("http://localhost:5000/health");
        const data = await response.json();
        addResult("Backend Health Check", response.ok ? "success" : "error", {
          status: response.status,
          data: data,
        });
      } catch (error) {
        addResult("Backend Health Check", "error", {
          error: error.message,
          message: "Cannot connect to backend at http://localhost:5000",
          solution: "Make sure the Node.js backend is running on port 5000",
        });
      }
    }

    async function testGetAllItems() {
      try {
        const response = await fetch(`${API_URL}/items`);
        const data = await response.json();
        addResult("Get All Items", response.ok ? "success" : "error", {
          status: response.status,
          itemCount: Array.isArray(data) ? data.length : data.items?.length || 0,
          sample: Array.isArray(data) ? data.slice(0, 2) : data.items?.slice(0, 2),
        });
      } catch (error) {
        addResult("Get All Items", "error", {
          error: error.message,
          url: `${API_URL}/items`,
        });
      }
    }

    async function testGetSingleItem() {
      const testItemId = "69fe38240e6790383c75b0ed";
      try {
        const response = await fetch(`${API_URL}/items/${testItemId}`);
        const data = await response.json();
        addResult(
          `Get Single Item (${testItemId})`,
          response.ok ? "success" : "error",
          {
            status: response.status,
            data: data,
          }
        );
      } catch (error) {
        addResult(
          `Get Single Item (${testItemId})`,
          "error",
          {
            error: error.message,
            url: `${API_URL}/items/${testItemId}`,
          }
        );
      }
    }

    // Auto-run tests on page load
    window.addEventListener("load", () => {
      console.log("Starting API tests...");
      testHealthCheck();
      setTimeout(() => testGetAllItems(), 500);
      setTimeout(() => testGetSingleItem(), 1000);
    });
  </script>
</body>
</html>
